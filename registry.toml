# cgvant public data registry — catalog of source/snapshot configs (NOT the data).
# Served as a static file; cgvant fetches it over HTTPS. Each entry's `file` is a
# path (relative to this file's directory) to a config snippet.
#
# Sources are added by the issue-to-pr workflow when a `source-submission` issue
# is filed (e.g. via `cgvant registry submit`). Example shape:
#
# [[sources]]
# name        = "clinvar"
# version     = "2026-01"
# assembly    = "GRCh38"
# file        = "sources/clinvar/2026-01/clinvar-2026-01.toml"
# description = "ClinVar clinical significance"
#
# [[snapshots]]
# name        = "2026-06"
# file        = "snapshots/2026-06.toml"
# description = "GRCh38 starter snapshot"

