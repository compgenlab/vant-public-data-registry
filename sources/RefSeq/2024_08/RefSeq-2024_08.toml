[[sources]]
  name = "RefSeq"
  version = "2024_08"
  format = "gtf"
  url = "https://ftp.ncbi.nlm.nih.gov/refseq/H_sapiens/annotation/GRCh38_latest/refseq_identifiers"
  [sources.build]
    inputs = [
      "https://ftp.ncbi.nlm.nih.gov/refseq/H_sapiens/annotation/GRCh38_latest/refseq_identifiers/GRCh38_latest_genomic.gtf.gz",
    ]
    run = [
      "cgkit tab-sort -o {output} -p gff {workdir}/inputs/GRCh38_latest_genomic.gtf.gz",
    ]

  [[sources.annotations]]
    name = "REFSEQ_GENE"
    field = "GENE"

  [[sources.annotations]]
    name = "REFSEQ_GENEID"
    field = "GENEID"

  [[sources.annotations]]
    name = "REFSEQ_STRAND"
    field = "STRAND"

  [[sources.annotations]]
    name = "REFSEQ_BIOTYPE"
    field = "BIOTYPE"

  [[sources.annotations]]
    name = "REFSEQ_REGION"
    field = "REGION"

  [[sources.annotations]]
    name = "REFSEQ_CODING_GENE"
    field = "CODING"

  [[sources.annotations]]
    name = "REFSEQ_NONCODING_GENE"
    field = "NONCODING"
