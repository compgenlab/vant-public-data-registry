[[sources]]
  type = "tool"
  name = "vep"
  version = "113"
  assembly = "GRCh38"
  format = "vcf"
  requires = ["python3"]
  image = "docker://ensemblorg/ensembl-vep:release_113.3"
  engine = "apptainer"
  output = "vep.vcf.gz"
  assets   = ["expand_vep_vcf.py", "vep_vcf_worst_consequence.py"]
  threads = 4

  [[sources.setup]]
    name = "install"
    run = "INSTALL.pl -c {datadir} -r {datadir}/plugins -a cfp -g CSN -s homo_sapiens -y GRCh38"
    container = true

  [[sources.setup]]
    name = "polyphen-sift-db"
    run = "test -f {datadir}/PolyPhen_SIFT.db || curl -L --fail -o {datadir}/PolyPhen_SIFT.db http://ftp.ensembl.org/pub/current_variation/pangenomes/Human/homo_sapiens_pangenome_PolyPhen_SIFT_20240502.db"

  [[sources.steps]]
    name = "vep"
    run = "vep -i {input} -o {workdir}/vep.vcf --vcf --everything --symbol --cache --force_overwrite --plugin CSN --dir_cache {datadir} --dir_plugins {datadir}/plugins --fasta {ref} --fork {threads}"
    container = true

  [[sources.steps]]
    name = "postprocess"
    run = "python3 {workdir}/expand_vep_vcf.py < {workdir}/vep.vcf | python3 {workdir}/vep_vcf_worst_consequence.py | cgvant bgzip > {output}"

